# Example design-token spec for design-system-generator.
# Every color pair used by generated components is checked against
# WCAG AA contrast before anything is emitted.
name: acme

colors:
  primary: "#1d4ed8"     # blue-700
  background: "#ffffff"
  surface: "#f8fafc"
  text: "#0f172a"        # slate-900
  textMuted: "#475569"   # slate-600
  danger: "#b91c1c"      # red-700
  success: "#15803d"     # green-700
  warning: "#b45309"     # amber-700

# Optional dark-theme palette, same shape as `colors`. Validated against
# WCAG AA independently — omit this block entirely for a light-only system.
darkColors:
  primary: "#3b82f6"     # blue-500
  background: "#0f172a"  # slate-900
  surface: "#1e293b"     # slate-800
  text: "#f1f5f9"        # slate-100
  textMuted: "#94a3b8"   # slate-400
  danger: "#f87171"      # red-400
  success: "#4ade80"     # green-400
  warning: "#fbbf24"     # amber-400

typography:
  fontFamily: "'Inter', system-ui, sans-serif"
  baseSizePx: 16
  scale: 1.25

spacing:
  unitPx: 4

radius:
  sm: 4px
  md: 8px
  lg: 16px

focus:
  ringWidthPx: 3
